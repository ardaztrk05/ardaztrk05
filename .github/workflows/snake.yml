name: Generate Snake
 
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main
 
jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ardaztrk05
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=#DC143C&color_dots=#1a0000,#4d0000,#8b0000,#b22222,#ff0000
            dist/github-contribution-grid-snake.svg?color_snake=#8B0000&color_dots=#eeeeee,#f4c7c3,#e8837a,#cc3b30,#8B0000
 
      - name: Push output to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
